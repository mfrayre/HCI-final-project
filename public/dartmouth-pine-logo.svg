<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Green background circle/shape -->
  <rect width="1024" height="1024" fill="#1b7a4d"/>

  <!-- Pine tree (white) -->
  <g fill="white">
    <!-- Tree branches - left side -->
    <path d="M 420 700 L 300 650 L 420 600 Z"/>
    <path d="M 420 600 L 280 540 L 420 480 Z"/>
    <path d="M 420 480 L 260 410 L 420 340 Z"/>
    <path d="M 430 280 L 260 200 L 430 120 Z"/>

    <!-- Tree branches - right side -->
    <path d="M 604 700 L 724 650 L 604 600 Z"/>
    <path d="M 604 600 L 744 540 L 604 480 Z"/>
    <path d="M 604 480 L 764 410 L 604 340 Z"/>
    <path d="M 594 280 L 764 200 L 594 120 Z"/>

    <!-- Tree trunk -->
    <rect x="500" y="700" width="24" height="250" fill="white"/>

    <!-- Top point -->
    <polygon points="512,80 500,120 524,120"/>
  </g>
</svg>